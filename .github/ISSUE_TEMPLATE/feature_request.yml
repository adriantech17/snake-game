name: Feature request
description: Suggest a focused improvement for the game or project workflow.
title: '[Feature]: '
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Keep feature requests focused on one user-visible or workflow improvement.
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What user need or workflow gap should this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should change?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Mention any simpler or different approaches worth considering.
    validations:
      required: false
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: What must be true for this to be complete?
      placeholder: |
        - The player can ...
        - Existing behavior remains ...
    validations:
      required: true
