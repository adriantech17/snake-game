name: Bug report
description: Report a reproducible problem in the game or project workflow.
title: '[Bug]: '
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Clear reproduction steps help keep fixes focused.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is going wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps needed to see the bug.
      placeholder: |
        1. Open the game
        2. Press ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should happen instead?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happens now?
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, and device if relevant.
      placeholder: 'Chrome 124, macOS, desktop'
    validations:
      required: false
  - type: textarea
    id: media
    attributes:
      label: Screenshots or recordings
      description: Add visuals when the issue affects gameplay or layout.
    validations:
      required: false
