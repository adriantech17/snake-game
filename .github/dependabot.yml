version: 2

updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '07:00'
      timezone: 'Europe/Madrid'
    open-pull-requests-limit: 4
    pull-request-branch-name:
      separator: '-'
    commit-message:
      prefix: 'chore(deps)'
      include: 'scope'
    groups:
      npm-production-minor-patch:
        dependency-type: 'production'
        patterns:
          - '*'
        update-types:
          - 'minor'
          - 'patch'
      npm-development-minor-patch:
        dependency-type: 'development'
        patterns:
          - '*'
        update-types:
          - 'minor'
          - 'patch'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '07:30'
      timezone: 'Europe/Madrid'
    open-pull-requests-limit: 3
    pull-request-branch-name:
      separator: '-'
    commit-message:
      prefix: 'chore(actions)'
      include: 'scope'
    groups:
      github-actions-minor-patch:
        patterns:
          - '*'
        update-types:
          - 'minor'
          - 'patch'
